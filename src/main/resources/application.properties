# ==========================================
# Spring Boot Application Configuration
# ==========================================
spring.application.name=quantity-measurement-app

# ==========================================
# JPA / Hibernate Configuration
# ==========================================
spring.datasource.url=jdbc:h2:mem:quantitymeasurementdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ==========================================
# H2 Console Configuration
# ==========================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ==========================================
# Logging Configuration
# ==========================================
logging.level.root=INFO
logging.level.com.app.quantitymeasurement=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ==========================================
# Swagger / OpenAPI Configuration
# ==========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ==========================================
# Actuator Configuration
# ==========================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ==========================================
# Security Configuration
# ==========================================
app.jwtSecret=9a67475df65d61474138e841955c9121731668ee0420794fd31c69c6fc965ed4d791550998f4130097746522c73335c9121
app.jwtExpirationMs=86400000

# OAuth2 Client Configuration (Provide dummy values so ClientRegistrationRepository bean is created)
spring.security.oauth2.client.registration.google.client-id=dummy-google-client-id
spring.security.oauth2.client.registration.google.client-secret=dummy-google-client-secret
spring.security.oauth2.client.registration.google.scope=profile,email

spring.security.oauth2.client.registration.github.client-id=dummy-github-client-id
spring.security.oauth2.client.registration.github.client-secret=dummy-github-client-secret
spring.security.oauth2.client.registration.github.scope=user:email,read:user
